# ArgoCD cluster registration via ExternalSecret (Option B — AWS profile, ArgoCD v2.10+)
#
# Placeholders:
#   ARGOCD_CLUSTER_NAME  — free alias: K8s resource name, ArgoCD display name, secrets store path
#   CLUSTER_SECRET_STORE — ClusterSecretStore with access to the secrets backend
#
# Required keys at secrets store path  eks/<ARGOCD_CLUSTER_NAME>:
#   server      — EKS API endpoint URL    (aws eks describe-cluster --query "cluster.endpoint")
#   caData      — base64 CA certificate   (aws eks describe-cluster --query "cluster.certificateAuthority.data")
#   clusterName — EKS cluster name in AWS (aws eks describe-cluster --query "cluster.name")
#   profile     — AWS credentials profile name (must be mounted into the ArgoCD pod)

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: <ARGOCD_CLUSTER_NAME>
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: <CLUSTER_SECRET_STORE>
    kind: ClusterSecretStore
  target:
    name: <ARGOCD_CLUSTER_NAME>
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      data:
        name: <ARGOCD_CLUSTER_NAME>
        server: "{{ .server }}"
        config: |
          {
            "awsAuthConfig": { "clusterName": "{{ .clusterName }}", "profile": "{{ .profile }}" },
            "tlsClientConfig": { "insecure": false, "caData": "{{ .caData }}" }
          }
  data:
    - secretKey: server
      remoteRef:
        key: eks/<ARGOCD_CLUSTER_NAME>
        property: server
    - secretKey: caData
      remoteRef:
        key: eks/<ARGOCD_CLUSTER_NAME>
        property: caData
    - secretKey: clusterName
      remoteRef:
        key: eks/<ARGOCD_CLUSTER_NAME>
        property: clusterName
    - secretKey: profile
      remoteRef:
        key: eks/<ARGOCD_CLUSTER_NAME>
        property: profile
